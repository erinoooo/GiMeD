name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyinstaller
      - run: bash build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: gimed-binary
          path: dist/gimed
