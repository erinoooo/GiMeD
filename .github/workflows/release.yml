name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyinstaller
      - run: bash build.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gimed
