name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name gimed-linux-x86_64 gimed/__main__.py

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gimed-linux-x86_64
          token: ${{ secrets.PAT }}
